<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Service Unavailable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #333;
    }

    .card {
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 420px;
    }

    .icon {
      font-size: 50px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 10px 0;
      font-size: 24px;
      color: #e74c3c;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      margin: 10px 0;
    }

    .telegram {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 18px;
      background: #0088cc;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .telegram:hover {
      background: #0077b5;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="icon">⚠️</div>
    <h1>We are Offline</h1>

    <p>
      We are currently offline due to no budget support.<br>
      Please try again later or contact support for more information.
    </p>

    <a class="telegram" href="https://t.me/sovann067" target="_blank">
      Contact Telegram
    </a>

    <div class="footer">
      © Service temporarily unavailable
    </div>
  </div>
</body>
</html>
